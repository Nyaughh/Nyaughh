<svg xmlns="http://www.w3.org/2000/svg" width="400" height="130" viewBox="0 0 400 130">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&amp;display=swap');
    </style>

    <filter id="spray" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.9" numOctaves="4" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G" result="rough"/>
      <feGaussianBlur in="rough" stdDeviation="0.4" result="soft"/>
      <feMerge>
        <feMergeNode in="soft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow halo -->
  <text
    x="50%" y="90"
    font-family="'Caveat', cursive"
    font-size="108"
    font-weight="700"
    text-anchor="middle"
    fill="#f5e6c8"
    opacity="0.2"
    filter="url(#glow)"
  >Latte</text>

  <!-- Main text -->
  <text
    x="50%" y="90"
    font-family="'Caveat', cursive"
    font-size="108"
    font-weight="700"
    text-anchor="middle"
    fill="#f5e6c8"
    filter="url(#spray)"
  >Nyaughh</text>
</svg>
